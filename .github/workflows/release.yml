name: release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:live-smoke

# npm publish is intentionally NOT a CI job. The maintainer publishes locally
# from an authenticated machine ("npm publish --tag <next|latest> --access public")
# so the publish path can never be hijacked by a stolen CI token or a compromised
# GitHub Actions runner. Recent npm supply-chain incidents (token-stealing
# worms in published packages, malicious workflow injection) make manual local
# publish the safer default for this package's release surface.
