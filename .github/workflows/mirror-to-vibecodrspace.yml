name: mirror to VibecodrSpace

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-to-vibecodrspace-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'BradenHartsell/Vibecodr-CLI'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create VibecodrSpace mirror token
        id: mirror-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VIBECODRSPACE_MIRROR_APP_CLIENT_ID }}
          private-key: ${{ secrets.VIBECODRSPACE_MIRROR_APP_PRIVATE_KEY }}
          owner: VibecodrSpace
          repositories: Vibecodr-CLI
          permission-contents: write
          permission-workflows: write

      - name: Push main and tags to VibecodrSpace mirror
        env:
          VIBECODRSPACE_MIRROR_TOKEN: ${{ steps.mirror-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VIBECODRSPACE_MIRROR_TOKEN:-}" ]]; then
            echo "GitHub App mirror token was not created." >&2
            exit 1
          fi

          git fetch origin +refs/heads/main:refs/remotes/origin/main +refs/tags/*:refs/tags/*
          git remote add mirror "https://x-access-token:${VIBECODRSPACE_MIRROR_TOKEN}@github.com/VibecodrSpace/Vibecodr-CLI.git"
          trap 'git remote remove mirror >/dev/null 2>&1 || true' EXIT

          git push mirror refs/remotes/origin/main:refs/heads/main
          git push mirror --tags
